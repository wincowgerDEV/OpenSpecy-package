# Workflow derived from https://github.com/r-wasm/actions/tree/v3/examples
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

name: Build and deploy wasm R package repository

permissions:
  contents: read

concurrency:
  group: wasm-cran-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      PACKAGE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup R for manifest checks
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install manifest dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::jsonlite

      - name: Resolve complete app package closure
        id: package-roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "_wasm/pinned/metadata"
          Rscript tools/wasm/resolve-wasm-package-roots.R \
            inst/shiny/wasm/app-package-roots.txt \
            _wasm/resolved-package-roots.txt
          {
            echo "packages<<EOF"
            cat _wasm/resolved-package-roots.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          cp _wasm/resolved-package-roots.txt \
            "_wasm/pinned/metadata/resolved-package-roots.txt"

      - name: Record pinned app manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "_wasm/pinned/metadata"
          Rscript tools/wasm/write-app-manifest.R \
            --artifact-ref "openspecy-wasm-${PACKAGE_SHA}" \
            --package-sha "${PACKAGE_SHA}" \
            --out "_wasm/pinned/metadata/wasm-app-manifest.json"
          cp inst/shiny/wasm/app-package-roots.txt "_wasm/pinned/metadata/app-package-roots.txt"
          cp inst/shiny/wasm/library-types.txt "_wasm/pinned/metadata/library-types.txt"

      - name: Build wasm package repository
        uses: r-wasm/actions/build-rwasm@v3
        with:
          packages: ${{ steps.package-roots.outputs.packages }}
          repo-path: _wasm/pinned/repo
          image-path: _wasm/pinned/image
          strip: demo, doc, examples, help, html, include, tests, vignette

      - name: Check wasm package repository contents
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/check-wasm-repo.R \
            "_wasm/pinned/repo" \
            "_wasm/pinned/image" \
            "_wasm/pinned/metadata/resolved-wasm-packages.json"

      - name: Upload pinned wasm build artifact
        uses: actions/upload-artifact@v7
        with:
          name: openspecy-wasm-${{ env.PACKAGE_SHA }}
          path: _wasm/pinned
          retention-days: 90
          if-no-files-found: error
