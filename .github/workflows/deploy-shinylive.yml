on:
  workflow_run:
    workflows: ["Build and deploy wasm R package repository"]
    branches: [main, master]
    types: [completed]
  workflow_dispatch:
    inputs:
      package_sha:
        description: Commit SHA whose wasm package repository should be used
        required: true
        type: string
      wasm_run_id:
        description: Successful wasm repository workflow run containing the pinned build artifact
        required: true
        type: string

name: Build and deploy Shinylive app

permissions:
  actions: read
  contents: write

concurrency:
  group: shinylive-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PACKAGE_SHA: ${{ github.event.workflow_run.head_sha || inputs.package_sha || github.sha }}
      WASM_ARTIFACT_RUN_ID: ${{ github.event.workflow_run.id || inputs.wasm_run_id }}
    steps:
      - name: Checkout package source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.package_sha || github.sha }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install package, app, and Shinylive dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::jsonlite
            any::shinylive
            any::httpuv
          needs: website

      - name: Resolve pinned wasm repository URL
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          echo "OPENSPECY_WASM_REPO_URL=${base%/}/wasm/${PACKAGE_SHA}/repo" >> "$GITHUB_ENV"
          echo "OPENSPECY_SHINYLIVE_URL=${base%/}/openspecy/" >> "$GITHUB_ENV"
          package_version=$(awk -F ': *' '$1 == "Version" {print $2}' DESCRIPTION)
          test -n "${package_version}"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"

      - name: Download pinned wasm build artifact
        uses: actions/download-artifact@v7
        with:
          name: openspecy-wasm-${{ env.PACKAGE_SHA }}
          path: _wasm/pinned
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.WASM_ARTIFACT_RUN_ID }}

      - name: Verify pinned wasm build artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f _wasm/pinned/repo/bin/emscripten/contrib/*/PACKAGES
          test -f _wasm/pinned/image/library.data.gz
          test -f _wasm/pinned/image/library.js.metadata

      - name: Stage small OpenSpecy libraries
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/stage-shinylive-libraries.R \
            --out-dir "_wasm/libraries" \
            --manifest-out "_wasm/library-manifest.json"

      - name: Smoke test staged libraries
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/smoke-staged-libraries.R "_wasm/libraries"

      - name: Export pinned Shinylive app
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/prepare-shinylive-app.R \
            --repo-url "${OPENSPECY_WASM_REPO_URL}" \
            --package-sha "${PACKAGE_SHA}" \
            --library-dir "_wasm/libraries" \
            --out-dir "_site/openspecy" \
            --work-dir "_wasm/app-source" \
            --manifest-out "_wasm/wasm-app-manifest.json"

      - name: Bundle pinned wasm package library
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/bundle-wasm-library.R \
            --image-dir "_wasm/pinned/image" \
            --repo-dir "_wasm/pinned/repo" \
            --site-dir "_site/openspecy" \
            --package-sha "${PACKAGE_SHA}"

      - name: Check Shinylive export
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/check-shinylive-export.R "_site/openspecy"

      - name: Setup Node for browser smoke
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run browser smoke
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save @playwright/test http-server
          npx playwright install chromium
          npx http-server _site -p 8080 > /tmp/openspecy-http.log 2>&1 &
          SHINYLIVE_SMOKE_URL=http://127.0.0.1:8080/openspecy/ \
          OPENSPECY_EXPECTED_VERSION="${PACKAGE_VERSION}" \
            npx playwright test tools/wasm/shinylive-smoke.spec.js

      - name: Upload Shinylive build artifact
        uses: actions/upload-artifact@v7
        with:
          name: openspecy-shinylive-${{ env.PACKAGE_SHA }}
          path: |
            _site/openspecy
            _wasm/library-manifest.json
            _wasm/wasm-app-manifest.json
            _wasm/pinned/metadata/resolved-wasm-packages.json

      - name: Deploy Shinylive app
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: _site/openspecy
          target-folder: openspecy

      - name: Verify public GitHub Pages app
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..24}; do
            if body=$(curl --fail --silent --show-error "${OPENSPECY_SHINYLIVE_URL}"); then
              grep -q "runExportedApp" <<< "$body"
              echo "Verified ${OPENSPECY_SHINYLIVE_URL}"
              exit 0
            fi
            echo "Waiting for GitHub Pages deployment (${attempt}/24)..."
            sleep 15
          done
          echo "GitHub Pages did not publish ${OPENSPECY_SHINYLIVE_URL}" >&2
          exit 1
