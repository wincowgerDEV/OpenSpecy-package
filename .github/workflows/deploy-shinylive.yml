on:
  workflow_run:
    workflows: ["Build and deploy wasm R package repository"]
    branches: [main, master]
    types: [completed]
  workflow_dispatch:
    inputs:
      package_sha:
        description: Commit SHA whose wasm package repository should be used
        required: true
        type: string
      wasm_run_id:
        description: Successful wasm repository workflow run containing the pinned build artifact
        required: true
        type: string

name: Build and deploy Shinylive app

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PACKAGE_SHA: ${{ github.event.workflow_run.head_sha || inputs.package_sha || github.sha }}
      WASM_ARTIFACT_RUN_ID: ${{ github.event.workflow_run.id || inputs.wasm_run_id }}
    steps:
      - name: Checkout package source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.package_sha || github.sha }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install package, app, and Shinylive dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::jsonlite
            shinylive@0.5.0
            any::httpuv
          needs: website
          pak-version: repo

      - name: Verify pinned Shinylive toolchain
        shell: Rscript {0}
        run: |
          stopifnot(as.character(packageVersion("shinylive")) == "0.5.0")
          cat("Shinylive ", as.character(packageVersion("shinylive")),
              "; assets ", shinylive:::SHINYLIVE_ASSETS_VERSION,
              "; WebR R ", shinylive:::WEBR_R_VERSION, "\n", sep = "")

      - name: Resolve pinned build metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "OPENSPECY_WASM_ARTIFACT_REF=openspecy-wasm-${PACKAGE_SHA}" >> "$GITHUB_ENV"
          package_version=$(awk -F ': *' '$1 == "Version" {print $2}' DESCRIPTION)
          test -n "${package_version}"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"

      - name: Build pkgdown site
        shell: Rscript {0}
        run: |
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install = FALSE,
            dest_dir = "_site"
          )

      - name: Download pinned wasm build artifact
        uses: actions/download-artifact@v7
        with:
          name: openspecy-wasm-${{ env.PACKAGE_SHA }}
          path: _wasm/pinned
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.WASM_ARTIFACT_RUN_ID }}

      - name: Verify pinned wasm build artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f _wasm/pinned/repo/bin/emscripten/contrib/*/PACKAGES
          test -f _wasm/pinned/image/library.data.gz
          test -f _wasm/pinned/image/library.js.metadata

      - name: Stage small OpenSpecy libraries
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/stage-shinylive-libraries.R \
            --out-dir "_wasm/libraries" \
            --manifest-out "_wasm/library-manifest.json"

      - name: Smoke test staged libraries
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/smoke-staged-libraries.R "_wasm/libraries"

      - name: Export pinned Shinylive app
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/prepare-shinylive-app.R \
            --artifact-ref "${OPENSPECY_WASM_ARTIFACT_REF}" \
            --package-sha "${PACKAGE_SHA}" \
            --library-dir "_wasm/libraries" \
            --out-dir "_site/app" \
            --work-dir "_wasm/app-source" \
            --manifest-out "_wasm/wasm-app-manifest.json"

      - name: Bundle pinned wasm package library
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/bundle-wasm-library.R \
            --image-dir "_wasm/pinned/image" \
            --repo-dir "_wasm/pinned/repo" \
            --site-dir "_site/app" \
            --package-sha "${PACKAGE_SHA}"

      - name: Check Shinylive export
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/check-shinylive-export.R "_site/app"

      - name: Setup Node for browser smoke
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run browser smoke
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save @playwright/test@1.61.1 http-server@14.1.1
          npx playwright install chromium
          npx http-server _site -p 8080 > /tmp/openspecy-http.log 2>&1 &
          SHINYLIVE_SMOKE_URL=http://127.0.0.1:8080/ \
          OPENSPECY_EXPECTED_VERSION="${PACKAGE_VERSION}" \
            npx playwright test tools/wasm/shinylive-smoke.spec.js \
              --output _wasm/playwright-results

      - name: Upload combined site build artifact
        uses: actions/upload-artifact@v7
        with:
          name: openspecy-pages-${{ env.PACKAGE_SHA }}
          path: |
            _site
            _wasm/library-manifest.json
            _wasm/wasm-app-manifest.json
            _wasm/pinned/metadata/resolved-wasm-packages.json
          retention-days: 90
          if-no-files-found: error

      - name: Validate assembled Pages site
        shell: bash
        run: |
          set -euo pipefail
          Rscript tools/wasm/check-pages-site.R _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public GitHub Pages app
        shell: bash
        run: |
          set -euo pipefail
          pages_url="${{ steps.deployment.outputs.page_url }}"
          public_url="${pages_url%/}/"
          app_url="${public_url}app/"
          for attempt in {1..40}; do
            if root_body=$(curl --fail --silent --show-error "${public_url}") && \
               app_body=$(curl --fail --silent --show-error "${app_url}"); then
              grep -q "data-openspecy-embed" <<< "$root_body"
              grep -q 'src="app/"' <<< "$root_body"
              grep -q "runExportedApp" <<< "$app_body"
              echo "Verified ${public_url} and ${app_url}"
              exit 0
            fi
            echo "Waiting for GitHub Pages deployment (${attempt}/40)..."
            sleep 15
          done
          echo "GitHub Pages did not publish the integrated site at ${public_url}" >&2
          exit 1
