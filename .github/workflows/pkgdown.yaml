# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      # The dependency cache is keyed primarily by package metadata. During
      # same-version development it can therefore restore an older OpenSpecy
      # installation even though the checkout has newer R code. Force the
      # website process to use this exact checkout before building articles.
      - name: Install current package source
        shell: Rscript {0}
        run: |
          install.packages(".", repos = NULL, type = "source")
          source <- read.dcf("DESCRIPTION", fields = c("Package", "Version"))[1, ]
          installed <- utils::packageDescription(source[["Package"]])
          stopifnot(identical(installed[["Version"]], source[["Version"]]))
          namespace <- asNamespace(source[["Package"]])
          stopifnot(exists(".fill_peaks_smooth", namespace, inherits = FALSE))
          cat("Using ", source[["Package"]], " ", installed[["Version"]],
              " from ", find.package(source[["Package"]]), "\n", sep = "")

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, dest_dir = "docs/pkgdown")
        shell: Rscript {0}

      - name: List built site
        run: ls -R docs/pkgdown

      - name: Upload pkgdown validation artifact
        uses: actions/upload-artifact@v7
        with:
          name: pkgdown-${{ github.sha }}
          path: docs/pkgdown
          retention-days: 14
          if-no-files-found: error
