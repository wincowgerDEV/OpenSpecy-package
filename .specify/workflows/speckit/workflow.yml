schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Concise Plan Cycle"
  version: "2.0.0"
  author: "OpenSpecy"
  description: "Create one concise feature plan, review it, then implement from its checklist"

requires:
  speckit_version: ">=0.8.5"
  integrations:
    any:
      - "codex"

inputs:
  plan:
    type: string
    required: true
    prompt: "Describe the feature, fix, or refactor"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use; 'auto' uses the project's initialized integration"

steps:
  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.plan }}"

  - id: review-plan
    type: gate
    message: "Review the concise plan before implementation."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.plan }}"
